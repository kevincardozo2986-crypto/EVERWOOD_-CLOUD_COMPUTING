<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Everwood</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
<!-- RESUMEN CLOUD -->

<div class="bg-gradient-to-r from-blue-600 to-indigo-700
            rounded-3xl shadow-xl p-8 mb-10 text-white">

    <div class="flex flex-col md:flex-row md:justify-between gap-6">

        <!-- TOTAL -->

        <div>
            <p class="text-sm uppercase tracking-widest text-blue-200">
                Total Archivos
            </p>

            <h2 class="text-4xl font-bold mt-2"
                th:text="${totalArchivos}">
            </h2>
        </div>

        <!-- CARGADOS -->

        <div>
            <p class="text-sm uppercase tracking-widest text-green-200">
                Cargados
            </p>

            <h2 class="text-4xl font-bold mt-2"
                th:text="${archivosCargados}">
            </h2>
        </div>

        <!-- ERRORES -->

        <div>
            <p class="text-sm uppercase tracking-widest text-red-200">
                Errores
            </p>

            <h2 class="text-4xl font-bold mt-2"
                th:text="${archivosError}">
            </h2>
        </div>

        <!-- ESPACIO -->

        <div>
            <p class="text-sm uppercase tracking-widest text-purple-200">
                Almacenamiento
            </p>

            <h2 class="text-4xl font-bold mt-2">
                <span th:text="${tamanoTotal}"></span> KB
            </h2>
        </div>

    </div>

</div>
<div class="max-w-5xl mx-auto p-10">
    <h1 class="text-4xl font-bold mb-8 text-center text-blue-700">
        🚀 Everwood Cloud
    </h1>

    <!-- FORMULARIO -->
    <div class="max-w-5xl mx-auto p-10">
        <!-- ALERTAS -->

        <div th:if="${error}"
             class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg mb-6">

            <span th:text="${error}"></span>

        </div>

        <div th:if="${success}"
             class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded-lg mb-6">

            <span th:text="${success}"></span>

        </div>

        <!-- FORMULARIO -->
    <div class="bg-white p-6 rounded-xl shadow-md mb-10">
        <form action="/subir" method="post" enctype="multipart/form-data">
            <div class="mb-4">
                <label class="block mb-2 font-semibold">
                    Seleccionar archivo
                </label>
                <input type="file" name="archivo" class="border p-2 w-full rounded-lg">
            </div>
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg">
                Subir Archivo
            </button>
        </form>
    </div>
    <!-- TABLA -->
    <div class="bg-white p-6 rounded-xl shadow-md">
        <h2 class="text-2xl font-bold mb-6">
            📂 Archivos Subidos
        </h2>
        <table class="w-full border-collapse">
            <thead>
            <tr class="bg-gray-200">
                <th class="p-3 text-left">Nombre</th>
                <th class="p-3 text-left">Tipo</th>
                <th class="p-3 text-left">Estado</th>
                <th class="p-3 text-left">Responsable</th>
            </tr>
            </thead>

            <tbody>

            <!-- SI NO HAY ARCHIVOS -->

            <tr th:if="${#lists.isEmpty(archivos)}">
                <td colspan="5" class="text-center p-8 text-gray-500 text-lg">
                    📂 No hay archivos cargados
                </td>

            </tr>

            <!-- LISTA DE ARCHIVOS -->

            <tr th:each="archivo : ${archivos}" class="border-b hover:bg-blue-50 transition duration-200">
                <!-- NOMBRE -->
                <td class="p-4 font-medium text-gray-800">
                    <div class="flex items-center gap-2">
                        📄
                        <span th:text="${archivo.nombreArchivo}"></span>
                    </div>
                </td>

                <!-- TIPO -->

                <td class="p-4 text-gray-600">

            <span class="bg-gray-200 text-gray-700 px-3 py-1 rounded-full text-sm"
                  th:text="${archivo.tipoArchivo}">
            </span>

                </td>

                <!-- ESTADO -->

                <td class="p-4">
                    <!-- CARGADO -->

                    <span th:if="${archivo.estado == 'CARGADO'}" class="bg-green-200 text-green-800 px-3 py-1 rounded-full text-sm
                         font-semibold">

                ✅ CARGADO
            </span>
                    <!-- PENDIENTE -->

                    <span th:if="${archivo.estado == 'PENDIENTE'}" class="bg-yellow-200 text-yellow-800 px-3 py-1
                         rounded-full text-sm font-semibold">
                ⏳ PENDIENTE
            </span>
                    <!-- ERROR -->
                    <span th:if="${archivo.estado == 'ERROR'}" class="bg-red-200 text-red-800 px-3 py-1 rounded-full
                         text-sm font-semibold">
                ❌ ERROR
            </span>
                </td>
                <!-- RESPONSABLE -->
                <td class="p-4 text-gray-700 font-medium" th:text="${archivo.responsable}"></td>
                <!-- ACCIONES -->

                <td class="p-4">

                    <div class="flex gap-2">

                        <!-- ABRIR -->

                        <a th:href="${archivo.urlArchivo}"
                           target="_blank"
                           class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg text-sm transition">

                            Abrir

                        </a>

                        <!-- ELIMINAR -->

                        <form th:action="@{/eliminar/{id}(id=${archivo.id})}"
                              method="post">

                            <button type="submit"
                                    onclick="return confirm('¿Desea eliminar este archivo?')"
                                    class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg text-sm transition">

                                Eliminar

                            </button>

                        </form>

                    </div>

                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
